<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Aysa-Works — sıcak nötrlerin zamansız zarafetiyle mekân tasarlayan iç mimari stüdyosu. İstanbul." />
  <title>Aysa-Works | İç Mimari Stüdyosu</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;0,9..144,700;1,9..144,300;1,9..144,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      /* Sıcak nötrler %55–65 */
      --paper:       #FAF5EB;
      --ivory:       #F2EDE3;
      --grej:        #D8CFC0;
      --taupe:       #B5A68E;
      --stone:       #C4B8A6;
      --warm-gray:   #8C8578;
      --mushroom:    #A89F8F;

      /* Koyu tonlar %20–25 */
      --wood-dark:   #3A2E22;
      --ink:         #2B2018;
      --ink-deep:    #1F1914;
      --shadow:      rgba(31,25,20,.55);

      /* Bordo vurgu %10–15 */
      --bordeaux:      #6B1F28;
      --bordeaux-deep: #4F141B;
      --bordeaux-soft: #8A2E38;

      /* Metal ve aksesuar %3–5 */
      --brass:       #B89968;
      --bronze:      #9B8866;
      --antique:     #7D6B4F;

      --serif:       'Fraunces', Georgia, serif;
      --sans:        'Inter', system-ui, sans-serif;
      --ease:        cubic-bezier(.22,.61,.36,1);
    }

    html { scroll-behavior: smooth; }
    body {
      background: var(--ivory);
      color: var(--ink);
      font-family: var(--sans);
      font-weight: 400;
      line-height: 1.65;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    ::selection { background: var(--bordeaux); color: var(--paper); }

    img, svg { display: block; max-width: 100%; }
    button { font: inherit; }
    a { color: inherit; }

    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.4rem 3.5rem;
      background: transparent;
      transition: background .35s var(--ease), padding .35s var(--ease), border-color .35s var(--ease);
      border-bottom: 1px solid transparent;
    }
    nav.scrolled {
      background: rgba(242, 237, 227, 0.94);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-bottom-color: rgba(31,25,20,.08);
      padding: 1rem 3.5rem;
      color: var(--ink);
    }
    nav.on-dark:not(.scrolled) { color: var(--paper); }
    nav.on-dark:not(.scrolled) .nav-logo,
    nav.on-dark:not(.scrolled) .nav-links a { color: var(--paper); }
    nav.on-dark:not(.scrolled) .nav-logo .dot { background: var(--brass); }

    .nav-logo {
      text-decoration: none;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      line-height: 0;
      color: var(--ink);
    }
    .nav-logo .dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--bordeaux);
      display: inline-block;
      transition: background .3s var(--ease);
    }

    .logo-mark {
      object-fit: contain;
      display: block;
      mix-blend-mode: multiply;
      transition: filter .3s var(--ease);
    }
    nav.on-dark:not(.scrolled) .logo-mark {
      filter: invert(1);
      mix-blend-mode: screen;
    }
    .nav-logo .logo-mark   { width: 54px; height: 54px; }
    nav.scrolled .nav-logo .logo-mark { width: 46px; height: 46px; }
    footer .logo .logo-mark { width: 48px; height: 48px; }

    .hero-watermark {
      position: absolute;
      left: 4.5rem;
      top: 6.5rem;
      width: 72px;
      height: 72px;
      z-index: 4;
      opacity: .9;
      object-fit: contain;
      filter: invert(1);
      mix-blend-mode: screen;
      pointer-events: none;
    }

    .form-success .mark-logo {
      width: 40px; height: 40px;
      object-fit: contain;
      mix-blend-mode: multiply;
      filter: none;
    }

    .nav-links { display: flex; gap: 2.3rem; list-style: none; align-items: center; }
    .nav-links a {
      font-family: var(--sans);
      font-size: .76rem;
      font-weight: 500;
      letter-spacing: .14em;
      text-transform: uppercase;
      text-decoration: none;
      color: var(--ink);
      opacity: .72;
      cursor: pointer;
      position: relative;
      padding: .25rem 0;
      transition: opacity .2s;
    }
    .nav-links a::after {
      content: '';
      position: absolute;
      bottom: -3px; left: 0;
      width: 0; height: 1px;
      background: currentColor;
      transition: width .35s var(--ease);
    }
    .nav-links a:hover, .nav-links a.active { opacity: 1; }
    .nav-links a.active::after { width: 100%; }

    .nav-cta {
      padding: .55rem 1.15rem !important;
      border: 1px solid currentColor;
      border-radius: 100px;
      opacity: .9 !important;
      letter-spacing: .12em !important;
    }
    .nav-cta::after { display: none !important; }
    .nav-cta:hover { background: var(--bordeaux); border-color: var(--bordeaux); color: var(--paper) !important; }

    .page { display: none; }
    .page.active { display: block; animation: fadeIn .55s var(--ease); }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: .7rem;
      padding: 1.05rem 2.2rem;
      border: 1px solid currentColor;
      font-family: var(--sans);
      font-size: .75rem;
      font-weight: 500;
      letter-spacing: .14em;
      text-transform: uppercase;
      text-decoration: none;
      cursor: pointer;
      background: transparent;
      color: inherit;
      transition: background .3s var(--ease), color .3s var(--ease), transform .3s var(--ease), border-color .3s var(--ease);
      width: fit-content;
    }
    .btn:hover { transform: translateY(-2px); }
    .btn .arr { transition: transform .3s var(--ease); }
    .btn:hover .arr { transform: translateX(4px); }

    .btn-light { color: var(--paper); border-color: var(--paper); }
    .btn-light:hover { background: var(--paper); color: var(--ink); }
    .btn-dark { color: var(--ink); border-color: var(--ink); }
    .btn-dark:hover { background: var(--ink); color: var(--paper); }
    .btn-bordeaux { color: var(--paper); background: var(--bordeaux); border-color: var(--bordeaux); }
    .btn-bordeaux:hover { background: var(--bordeaux-deep); border-color: var(--bordeaux-deep); }
    .btn-ghost-light { color: var(--paper); border-color: rgba(250,245,235,.4); }
    .btn-ghost-light:hover { background: var(--paper); color: var(--ink); border-color: var(--paper); }

    .eyebrow {
      font-size: .72rem;
      font-weight: 500;
      letter-spacing: .22em;
      text-transform: uppercase;
      color: var(--bordeaux);
      margin-bottom: 1.2rem;
      display: inline-flex;
      align-items: center;
      gap: .7rem;
    }
    .eyebrow::before {
      content: '';
      width: 28px; height: 1px;
      background: currentColor;
    }
    .eyebrow.on-dark { color: var(--brass); }

    .section-title {
      font-family: var(--serif);
      font-size: clamp(2rem, 4vw, 3.4rem);
      font-weight: 400;
      line-height: 1.1;
      letter-spacing: -.015em;
    }
    .section-title em { font-style: italic; font-weight: 300; color: var(--bordeaux); }

    .reveal { opacity: 0; transform: translateY(28px); transition: opacity .9s var(--ease), transform .9s var(--ease); }
    .reveal.in { opacity: 1; transform: translateY(0); }

    .hero {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 1.05fr 1fr;
      position: relative;
      overflow: hidden;
      background: var(--ink);
      color: var(--paper);
    }
    .hero-text {
      padding: 9rem 4.5rem 5rem;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      position: relative;
      z-index: 3;
      background:
        radial-gradient(ellipse at 0% 100%, rgba(107,31,40,.28), transparent 55%),
        linear-gradient(180deg, var(--ink) 0%, var(--ink-deep) 100%);
    }
    .hero-text::after {
      content: '';
      position: absolute;
      top: 0; bottom: 0; right: -1px;
      width: 1px;
      background: linear-gradient(180deg, transparent, rgba(184,153,104,.35), transparent);
    }

    .hero-tag {
      font-size: .75rem;
      letter-spacing: .22em;
      text-transform: uppercase;
      color: var(--brass);
      opacity: .95;
      margin-bottom: 2rem;
      display: inline-flex;
      align-items: center;
      gap: .8rem;
    }
    .hero-tag::before {
      content: ''; width: 34px; height: 1px; background: var(--brass);
    }

    .hero-title {
      font-family: var(--serif);
      font-size: clamp(2.8rem, 6.5vw, 6.2rem);
      font-weight: 300;
      line-height: 1.02;
      letter-spacing: -.02em;
      margin-bottom: 2rem;
      color: var(--paper);
    }
    .hero-title em { font-style: italic; color: var(--brass); font-weight: 300; }
    .hero-title .line2 { color: var(--grej); }

    .hero-desc {
      font-size: 1rem;
      line-height: 1.85;
      color: var(--grej);
      opacity: .88;
      max-width: 48ch;
      margin-bottom: 2.5rem;
      font-weight: 300;
    }
    .hero-cta { display: flex; gap: 1rem; flex-wrap: wrap; }

    .hero-art {
      position: relative;
      overflow: hidden;
      display: grid;
      grid-template-rows: 2fr 1fr;
      gap: 4px;
      background: var(--ink-deep);
    }
    .hero-art .ha-top {
      position: relative;
      overflow: hidden;
    }
    .hero-art .ha-bot {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4px;
    }
    .hero-pic {
      position: relative;
      overflow: hidden;
      background-size: cover;
      background-position: center;
      transform: scale(1.01);
      transition: transform 10s var(--ease);
    }
    .hero-pic::after {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(160deg, rgba(31,25,20,0) 40%, rgba(31,25,20,.35) 100%);
    }
    .hero-art:hover .hero-pic { transform: scale(1.05); }
